name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches manifest version
        run: |
          VERSION=$(sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' manifest.json)
          if [ "v$VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match manifest version $VERSION" >&2
            exit 1
          fi

      - name: Build xpi
        run: bash build.sh

      - name: Create release with xpi attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.xpi \
            --title "ThunderSub ${GITHUB_REF_NAME#v}" --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" dist/*.xpi --clobber
