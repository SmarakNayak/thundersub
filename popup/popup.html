<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    font-family: system-ui, -apple-system, sans-serif;
    width: 260px;
    padding: 16px;
    margin: 0;
    background: #0f1117;
    color: #e2e4ef;
  }
  h2 {
    font-size: 16px;
    margin: 0 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stats {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #6b7280;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
  }
  .stat-val {
    color: #e2e4ef;
    font-weight: 600;
  }
  button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #6366f1;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { opacity: 0.85; }
</style>
</head>
<body>
  <h2><span>📬</span> ThunderSub</h2>
  <div class="stats">
    <div class="stat-row"><span>Pending</span><span class="stat-val" id="stat-pending">—</span></div>
    <div class="stat-row"><span>Kept</span><span class="stat-val" id="stat-kept">—</span></div>
    <div class="stat-row"><span>Unsubscribed</span><span class="stat-val" id="stat-unsub">—</span></div>
  </div>
  <button id="open-btn">Open Manager</button>
  <script src="popup.js"></script>
</body>
</html>
